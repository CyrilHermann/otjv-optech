<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="theme-color"
    content="#6f4e37"
  >

  <meta
    name="description"
    content="Application de coaching technique OTJV OPTECH"
  >

  <title>OTJV OPTECH Coaching</title>

  <link
    rel="stylesheet"
    href="style.css"
  >
</head>

<body>
  <header class="topbar">

    <div class="brand">

        <div class="logo">
            <img
                src="assets/logo.jpg"
                alt="Logo OTJV OPTECH"
                loading="eager"
                draggable="false">
        </div>

        <div>
            <strong>OTJV OPTECH</strong>
            <small>Outil de coaching technique</small>
        </div>

    </div>

    <div class="topbar-right">

        <button
            id="restartApp"
            class="restart-button"
            type="button">

            🔄 Nouveau coaching

        </button>

        <div
            id="progressText"
            class="progress-text">
        </div>

    </div>

</header>

  <div
    class="progress"
    aria-hidden="true"
  >
    <div id="progressBar"></div>
  </div>

  <main
    id="app"
    class="app"
  ></main>

  <!-- Bibliothèques externes -->
  <script
    src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"
  ></script>

  <script
    src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"
  ></script>

  <script
    src="https://cdn.jsdelivr.net/npm/signature_pad@5.0.4/dist/signature_pad.umd.min.js"
  ></script>

  <script
    src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"
  ></script>

  <!-- Fichiers de l'application -->
  <script src="questions.js"></script>
  <script src="lists.js"></script>
  <script src="data.js"></script>
  <script src="signature.js"></script>
  <script src="excel.js"></script>
  <script src="pdf.js"></script>
  <script src="app.js"></script>
</body>
</html>
